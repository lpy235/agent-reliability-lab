name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -v

      - name: Run MVP harness
        run: arl-harness

      - name: Compare Docs QA baseline
        run: |
          arl-baseline baselines/docs_qa_eval_report.json reports/eval-report.json \
            --report-path reports/baseline-comparison.md \
            --json-report-path reports/baseline-comparison.json

      - name: Compare Issue Triage baseline
        run: |
          arl-baseline baselines/issue_triage_eval_report.json reports/issue-triage-report.json \
            --report-path reports/issue-triage-baseline-comparison.md \
            --json-report-path reports/issue-triage-baseline-comparison.json

      - name: Upload reliability artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-reliability-lab-reports
          path: |
            reports/*.md
            reports/*.json
            runs.db
          if-no-files-found: warn
          retention-days: 14
