<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent Reliability Lab</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Agent Reliability Lab</h1>
        <p>Inspect traces, replay saved runs, and compare agent behavior.</p>
      </div>
      <button id="refresh-runs" type="button">Refresh</button>
    </header>

    <main class="layout">
      <aside class="runs-panel">
        <div class="panel-header">
          <h2>Runs</h2>
          <span id="run-count">0</span>
        </div>
        <div id="run-list" class="run-list"></div>
      </aside>

      <section class="trace-panel">
        <div id="run-summary" class="summary empty">Select a run to inspect its trace.</div>
        <div class="panel-header">
          <h2>Trace Timeline</h2>
        </div>
        <div id="step-list" class="step-list"></div>
      </section>

      <aside class="detail-panel">
        <div class="panel-section">
          <h2>Output</h2>
          <pre id="run-output">{}</pre>
        </div>

        <div class="panel-section">
          <h2>Replay</h2>
          <label class="toggle-row">
            <input id="fixed-context" type="checkbox" checked />
            Fixed retrieved context
          </label>
          <button id="replay-run" type="button" disabled>Replay selected run</button>
          <pre id="replay-output">{}</pre>
        </div>

        <div class="panel-section">
          <h2>Diff</h2>
          <label>
            Base run
            <input id="base-run-id" type="text" placeholder="run_..." />
          </label>
          <label>
            Candidate run
            <input id="candidate-run-id" type="text" placeholder="run_..." />
          </label>
          <button id="diff-runs" type="button">Compare</button>
          <pre id="diff-output">{}</pre>
        </div>
      </aside>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
